version: "3.9"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"        # your Mac port 8000 → container port 8000
    env_file:
      - .env.dev           # change to .env.uat or .env.prod to test other envs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    env_file:
      - .env.dev
    restart: unless-stopped   # if worker crashes, Docker restarts it automatically
    depends_on:
      - api