apiVersion: v1
kind: Service
metadata:
  name: agnos-api-service
spec:
  selector:
    app: agnos-api              # routes traffic to pods with this label
  ports:
    - protocol: TCP
      port: 80                  # Service listens on port 80
      targetPort: 8000          # forwards to container port 8000
  type: ClusterIP               # internal only — exposed via minikube tunnel or NodePort for testing