apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agnos-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agnos-api
  minReplicas: 2                 # never go below 2 (HA requirement)
  maxReplicas: 5                 # never go above 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70 # scale up when average CPU across pods exceeds 70%
          